<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>PTT Radio</title>
  <link rel="manifest" href="manifest.json"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --g:#00e676;--gd:#003311;--o:#ff6d00;--od:#1a0e00;
      --r:#ff1744;--bg:#0a0a0a;--sf:#111;--br:#1e1e1e;--mu:#444;
    }
    html,body{height:100%;background:var(--bg);color:#e0e0e0;font-family:'Courier New',monospace;overflow:hidden}
    #app{height:100dvh;display:flex;flex-direction:column;align-items:center;padding:14px;gap:10px}

    header{width:100%;display:flex;justify-content:space-between;align-items:center}
    .logo{font-size:17px;font-weight:bold;letter-spacing:4px;color:var(--g)}
    .pill{display:flex;align-items:center;gap:6px;background:var(--sf);border:1px solid var(--br);border-radius:20px;padding:6px 12px;font-size:11px;letter-spacing:1px}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--mu);transition:background .3s}
    .dot.g{background:var(--g);box-shadow:0 0 6px var(--g)}
    .dot.o{background:var(--o)}
    .dot.r{background:var(--r);animation:blink 1s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

    .sigbox{width:100%;background:var(--sf);border:1px solid var(--br);border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
    .siglbl{font-size:10px;letter-spacing:2px;color:var(--mu)}
    .bars{display:flex;align-items:flex-end;gap:3px;height:20px}
    .bars span{width:5px;background:var(--br);border-radius:2px;transition:background .3s}
    .bars span:nth-child(1){height:4px}.bars span:nth-child(2){height:8px}
    .bars span:nth-child(3){height:12px}.bars span:nth-child(4){height:16px}.bars span:nth-child(5){height:20px}
    .bars.s1 span:nth-child(-n+1){background:var(--g)}
    .bars.s2 span:nth-child(-n+2){background:var(--g)}
    .bars.s3 span:nth-child(-n+3){background:var(--g)}
    .bars.s4 span:nth-child(-n+4){background:var(--g)}
    .bars.s5 span{background:var(--g)}
    .pcnt{font-size:12px;color:var(--g);letter-spacing:1px}

    #rbar{width:100%;border-radius:10px;padding:11px 16px;text-align:center;font-size:13px;letter-spacing:3px;font-weight:bold;background:var(--od);border:1px solid var(--o);color:var(--o);opacity:0;transition:opacity .15s;pointer-events:none}
    #rbar.on{opacity:1}

    #pwrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;width:100%}

    #ptt{
      width:min(260px,72vw);height:min(260px,72vw);border-radius:50%;
      border:3px solid var(--br);background:var(--sf);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
      cursor:pointer;touch-action:none;
      user-select:none;-webkit-user-select:none;
      transition:border-color .1s,background .1s,box-shadow .1s;
    }
    #ptt.on{border-color:var(--g);background:var(--gd);animation:glow 1s ease-in-out infinite}
    #ptt.blocked{border-color:var(--o)}
    #ptt.off{opacity:.35;pointer-events:none}
    @keyframes glow{0%,100%{box-shadow:0 0 30px rgba(0,230,118,.2)}50%{box-shadow:0 0 60px rgba(0,230,118,.5)}}
    .pico{font-size:60px;line-height:1;pointer-events:none}
    .plbl{font-size:11px;letter-spacing:3px;color:var(--mu);pointer-events:none;transition:color .1s;text-align:center}
    #ptt.on .plbl{color:var(--g)}
    #ptt.blocked .plbl{color:var(--o)}

    #hint{font-size:11px;color:var(--mu);letter-spacing:1px;text-align:center;line-height:1.6}
    #meter{width:100%;height:4px;border-radius:2px;background:var(--br);overflow:hidden}
    #mbar{height:100%;width:0%;background:var(--g);border-radius:2px;transition:width .05s}

    #rbtn{display:none;background:none;border:1px solid var(--r);color:var(--r);font-family:'Courier New',monospace;font-size:12px;letter-spacing:2px;padding:11px;border-radius:8px;cursor:pointer;width:100%}
    #rbtn.show{display:block}

    /* Μικρό status bar κάτω */
    #sbar{width:100%;text-align:center;font-size:9px;color:var(--mu);letter-spacing:1px;padding-bottom:4px}

    #mscreen{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:32px}
    #mscreen h2{color:var(--g);letter-spacing:3px;font-size:16px;text-align:center}
    #mscreen p{color:var(--mu);font-size:12px;text-align:center;line-height:1.9;max-width:280px}
    #mbtn{background:var(--gd);border:2px solid var(--g);color:var(--g);font-family:'Courier New',monospace;font-size:14px;letter-spacing:2px;padding:18px;border-radius:12px;cursor:pointer;width:100%;touch-action:none}
    #merr{color:var(--r);display:none;font-size:12px;text-align:center}
  </style>
</head>
<body>

<div id="mscreen">
  <span style="font-size:72px">🎙️</span>
  <h2>PTT RADIO</h2>
  <p>Πάτα για να δώσεις άδεια μικροφώνου και να ξεκινήσει η εφαρμογή.</p>
  <button id="mbtn">▶ &nbsp;ΕΝΑΡΞΗ</button>
  <p id="merr">Δεν δόθηκε άδεια μικροφώνου.<br>Έλεγξε τις ρυθμίσεις Chrome.</p>
</div>

<div id="app" style="display:none">
  <header>
    <span class="logo">📻 PTT</span>
    <div class="pill"><div class="dot" id="dot"></div><span id="stxt">—</span></div>
  </header>

  <div class="sigbox">
    <span class="siglbl">ΣΗΜΑ</span>
    <div class="bars" id="bars"><span></span><span></span><span></span><span></span><span></span></div>
    <span class="pcnt" id="pcnt">—</span>
  </div>

  <div id="rbar">🔊 &nbsp;ΜΙΛΑΕΙ...</div>

  <div id="pwrap">
    <div id="ptt" class="off">
      <span class="pico">🎙️</span>
      <span class="plbl" id="plbl">ΚΡΑΤΑ ΓΙΑ PTT</span>
    </div>
    <div id="meter"><div id="mbar"></div></div>
    <p id="hint">Αναμονή σύνδεσης...</p>
  </div>

  <button id="rbtn" onclick="manualReconnect()">🔄 &nbsp;ΕΠΑΝΑΣΥΝΔΕΣΗ</button>
  <div id="sbar" id="sbar">—</div>
</div>

<audio id="ra" autoplay playsinline style="display:none"></audio>

<script>
'use strict';
// ══════════════════════════════════════════════
const SERVER = 'wss://ptt-server-92jv.onrender.com';
const ROOM = 'Τanos-Talia-8583';
// ══════════════════════════════════════════════

// TURN servers — χρησιμοποιούμε πολλαπλά για αξιοπιστία
const ICE_CFG = { iceServers:[
  // STUN (δωρεάν, για direct connection)
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {urls:'stun:stun.cloudflare.com:3478'},
  // TURN Metered — πιο αξιόπιστο από openrelay
  {urls:'turn:openrelay.metered.ca:80',   username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443',  username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turns:openrelay.metered.ca:443', username:'openrelayproject',credential:'openrelayproject'},
  // Extra TURN backup
  {urls:'turn:relay1.expressturn.com:3478',username:'efOPINJGDZBLBLAMQN',credential:'oRiPKq0y0DVcrMn3'},
]};

const $=s=>document.querySelector(s);
const $dot=$('#dot'),$stxt=$('#stxt'),$bars=$('#bars'),$pcnt=$('#pcnt');
const $rbar=$('#rbar'),$ptt=$('#ptt'),$plbl=$('#plbl'),$hint=$('#hint');
const $rbtn=$('#rbtn'),$mbar=$('#mbar'),$ra=$('#ra');
const $sbar=document.getElementById('sbar');

// ── State ──────────────────────────────────────
let ws=null, pc=null, myId=null;
let localStream=null, audioCtx=null;
let analyser=null, animFrame=null;
let pttActive=false, remoteActive=false;
let retryTimer=null, wsRetries=0;
let wakeLock=null;
// Perfect negotiation
let makingOffer=false, ignoreOffer=false, polite=false;
// Κρατάμε το PC ζωντανό ακόμα και αν πέσει το WS
let pcAlive=false;

function status(t){$sbar.textContent=t}
function setStatus(dc,txt){$dot.className='dot '+(dc||'');$stxt.textContent=txt}
function setSig(n,p){
  $bars.className='bars'+(n?' s'+n:'');
  $pcnt.textContent=p>0?p+(p===1?' χρήστης':' χρήστες'):'—';
}
function setHint(t){$hint.textContent=t}
function vibe(ms){navigator.vibrate&&navigator.vibrate(ms)}

// ── Wake lock ──────────────────────────────────
async function grabWake(){
  try{if('wakeLock' in navigator&&!wakeLock) wakeLock=await navigator.wakeLock.request('screen')}catch(_){}
}
function dropWake(){if(wakeLock){wakeLock.release();wakeLock=null}}

// ── Meter ──────────────────────────────────────
function startMeter(){
  if(!localStream||!audioCtx||analyser)return;
  try{
    if(audioCtx.state==='suspended')audioCtx.resume();
    const src=audioCtx.createMediaStreamSource(localStream);
    analyser=audioCtx.createAnalyser();analyser.fftSize=256;
    src.connect(analyser);
    const buf=new Uint8Array(analyser.frequencyBinCount);
    (function tick(){
      analyser.getByteFrequencyData(buf);
      $mbar.style.width=Math.min(100,buf.reduce((a,b)=>a+b,0)/buf.length*2.5)+'%';
      animFrame=requestAnimationFrame(tick);
    })();
  }catch(_){}
}
function stopMeter(){
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null}
  analyser=null;
  $mbar.style.width='0%';
}

// ════════════════════════════════════════════
//  INIT — mic + audio unlock (μέσα σε gesture)
// ════════════════════════════════════════════
async function init(){
  const btn=$('#mbtn');
  btn.textContent='⏳ ΠΑΡΑΚΑΛΩ ΠΕΡΙΜΕΝΕ...';
  btn.disabled=true;

  try{
    localStream=await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true,channelCount:1},
      video:false
    });
    // MUTED — ανοίγει μόνο με PTT
    localStream.getAudioTracks().forEach(t=>t.enabled=false);

    // AudioContext unlock (user gesture)
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') await audioCtx.resume();

    // Silent buffer για unlock autoplay
    const silBuf=audioCtx.createBuffer(1,1,22050);
    const silSrc=audioCtx.createBufferSource();
    silSrc.buffer=silBuf;silSrc.connect(audioCtx.destination);silSrc.start();

    // <audio> element unlock
    $ra.muted=false;$ra.volume=1.0;

    $('#mscreen').style.display='none';
    $('#app').style.display='flex';
    connectWs();

  }catch(err){
    btn.textContent='🔄 ΔΟΚΙΜΑΣΕ ΞΑΝΑ';
    btn.disabled=false;
    $('#merr').style.display='block';
  }
}

$('#mbtn').addEventListener('touchend',e=>{e.preventDefault();if(!$('#mbtn').disabled)init();},{passive:false});
$('#mbtn').addEventListener('click',()=>{if(!$('#mbtn').disabled)init();});

// ════════════════════════════════════════════
//  WebSocket — stable με exponential backoff
// ════════════════════════════════════════════
function connectWs(){
  clearTimeout(retryTimer);
  if(ws&&(ws.readyState===WebSocket.CONNECTING||ws.readyState===WebSocket.OPEN)){
    return; // Ήδη συνδεδεμένο ή συνδέεται
  }

  setStatus('o','ΣΥΝΔΕΣΗ...');
  status('Σύνδεση στον server...');
  $rbtn.classList.remove('show');

  try{ws=new WebSocket(SERVER)}
  catch(e){scheduleRetry();return}

  ws.onopen=()=>{
    wsRetries=0;
    setStatus('g','ΣΥΝΔΕΔΕΜΕΝΟ');
    status('Server OK');
    ws.send(JSON.stringify({type:'join',room:ROOM}));
  };

  ws.onmessage=({data})=>{
    let m;try{m=JSON.parse(data)}catch{return}
    handleMsg(m);
  };

  ws.onerror=()=>{status('WS error');};

  ws.onclose=e=>{
    // Αν η WebRTC σύνδεση είναι ζωντανή, ΜΗΝ την κλείσεις
    // Απλά επανασυνδέσου στο WS σιωπηλά
    if(e.code!==1000){
      setStatus('o','ΣΥΝΔΕΣΗ...');
      scheduleRetry();
    }
  };

  // Keep-alive ping κάθε 25s — κρατάει και το Render ξύπνιο
  const pingInt=setInterval(()=>{
    if(ws?.readyState===WebSocket.OPEN){
      ws.send(JSON.stringify({type:'ping'}));
    }else{
      clearInterval(pingInt);
    }
  },25000);
}

function scheduleRetry(){
  wsRetries++;
  // Exponential backoff: 2s, 4s, 8s, max 15s
  const delay=Math.min(2000*Math.pow(2,wsRetries-1),15000);
  status('Επανασύνδεση σε '+(delay/1000)+'s...');
  retryTimer=setTimeout(connectWs,delay);
  $rbtn.classList.add('show');
}

function send(msg){
  if(ws?.readyState===WebSocket.OPEN) ws.send(JSON.stringify(msg));
}

// ════════════════════════════════════════════
//  Message handler
// ════════════════════════════════════════════
async function handleMsg(m){
  switch(m.type){

    case 'joined':
      myId=m.id;
      setSig(3,m.peers);
      status('id='+myId+' peers='+m.peers);
      if(m.peers>=2){
        // Αν ΔΕΝ υπάρχει ήδη ζωντανή WebRTC σύνδεση, φτιάξε
        if(!pcAlive){
          polite=(parseInt(myId)%2===0);
          setupPc();
          if(!polite) await doOffer();
        }
        enablePtt();
      }else{
        setHint('Αναμονή 2ης συσκευής...');
        setSig(1,1);
      }
      break;

    case 'peer_joined':
      setSig(3,m.peers);
      status('Peer joined');
      if(m.peers>=2){
        if(!pcAlive){
          // Ήμουν πρώτος — κάνω offer
          polite=false;
          setupPc();
          await doOffer();
        }
        enablePtt();
      }
      break;

    case 'peer_left':
      setSig(1,1);
      setRemoteSpeaking(false);
      disablePtt();
      // Κλείσε PC μόνο αν πέσει ο peer
      closePc();
      status('Peer αποσυνδέθηκε');
      setHint('Η άλλη συσκευή αποσυνδέθηκε');
      break;

    // ── Perfect Negotiation ──────────────────
    case 'offer':{
      if(!pc) setupPc();
      const collision=makingOffer||pc.signalingState!=='stable';
      ignoreOffer=!polite&&collision;
      if(ignoreOffer){status('Offer collision ignored');break}
      try{
        if(collision){
          await pc.setLocalDescription({type:'rollback'});
        }
        await pc.setRemoteDescription(new RTCSessionDescription(m.sdp));
        const ans=await pc.createAnswer();
        await pc.setLocalDescription(ans);
        send({type:'answer',sdp:pc.localDescription});
        status('Answer sent');
      }catch(e){status('Offer err: '+e.message)}
      break;
    }

    case 'answer':
      if(!pc||ignoreOffer)break;
      try{
        await pc.setRemoteDescription(new RTCSessionDescription(m.sdp));
        status('Answer OK');
      }catch(e){status('Ans err: '+e.message)}
      break;

    case 'ice':
      if(!pc||!m.candidate)break;
      try{await pc.addIceCandidate(new RTCIceCandidate(m.candidate))}
      catch(e){if(!ignoreOffer)status('ICE err: '+e.message)}
      break;

    case 'ptt':
      setRemoteSpeaking(m.active);
      break;

    case 'ping':
      send({type:'pong'});
      break;
  }
}

// ════════════════════════════════════════════
//  WebRTC
// ════════════════════════════════════════════
function closePc(){
  if(pc){pc.close();pc=null}
  pcAlive=false;
  makingOffer=false;ignoreOffer=false;
}

function setupPc(){
  if(pc) return pc;
  pc=new RTCPeerConnection(ICE_CFG);
  pcAlive=false;

  pc.onicecandidate=e=>{
    if(e.candidate) send({type:'ice',candidate:e.candidate});
  };

  pc.oniceconnectionstatechange=()=>{
    const s=pc.iceConnectionState;
    status('ICE: '+s);
    if(s==='connected'||s==='completed'){
      pcAlive=true;
      setSig(5,2);
      setStatus('g','ΕΝΕΡΓΟ');
      setHint('Κράτα πατημένο για να μιλήσεις');
    }else if(s==='disconnected'){
      pcAlive=false;
      setSig(2,2);
      setHint('Αστάθεια σύνδεσης...');
      // Δοκίμασε ICE restart αυτόματα
      setTimeout(()=>{
        if(pc&&pc.iceConnectionState==='disconnected'){
          status('ICE restart...');
          pc.restartIce();
          doOffer();
        }
      },2000);
    }else if(s==='failed'){
      pcAlive=false;
      setSig(1,1);
      status('ICE failed — restart');
      closePc();
      setTimeout(()=>{
        setupPc();
        doOffer();
      },1000);
    }
  };

  // Remote audio
  pc.ontrack=e=>{
    status('ontrack ✅');
    const stream=e.streams[0]||new MediaStream([e.track]);

    // Δοκίμασε πρώτα <audio> element
    $ra.srcObject=stream;
    $ra.play()
      .then(()=>status('Audio ✅ playing'))
      .catch(()=>{
        // Fallback: AudioContext
        try{
          if(audioCtx.state==='suspended')audioCtx.resume();
          const src=audioCtx.createMediaStreamSource(stream);
          src.connect(audioCtx.destination);
          status('Audio ✅ via AudioCtx');
        }catch(e2){status('Audio ❌ '+e2.message)}
      });
  };

  // Local track — muted, μπαίνει ΤΩΡΑ
  if(localStream){
    localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  }

  return pc;
}

async function doOffer(){
  if(!pc)return;
  try{
    makingOffer=true;
    const offer=await pc.createOffer({offerToReceiveAudio:true});
    if(pc.signalingState!=='stable'){makingOffer=false;return}
    await pc.setLocalDescription(offer);
    send({type:'offer',sdp:pc.localDescription});
    status('Offer sent');
  }catch(e){status('Offer err: '+e.message)}
  finally{makingOffer=false}
}

// ════════════════════════════════════════════
//  PTT
// ════════════════════════════════════════════
function enablePtt(){
  $ptt.classList.remove('off');
  if(!pttActive&&!remoteActive) setHint('Κράτα πατημένο για να μιλήσεις');
}
function disablePtt(){
  $ptt.classList.add('off');
  $ptt.classList.remove('on','blocked');
  if(!remoteActive) setHint('Αναμονή σύνδεσης...');
}

function pttOn(){
  if(remoteActive||!localStream||pttActive||$ptt.classList.contains('off'))return;
  pttActive=true;
  localStream.getAudioTracks().forEach(t=>t.enabled=true);
  $ptt.classList.add('on');
  $plbl.textContent='ΜΙΛΑΤΕ';
  vibe(40);
  grabWake();
  startMeter();
  send({type:'ptt',active:true});
  setHint('Μιλάτε... Αφήστε για να ακούσετε');
}

function pttOff(){
  if(!pttActive)return;
  pttActive=false;
  if(localStream) localStream.getAudioTracks().forEach(t=>t.enabled=false);
  $ptt.classList.remove('on');
  $plbl.textContent='ΚΡΑΤΑ ΓΙΑ PTT';
  stopMeter();
  dropWake();
  vibe(20);
  send({type:'ptt',active:false});
  if(!remoteActive) setHint('Κράτα πατημένο για να μιλήσεις');
}

function setRemoteSpeaking(active){
  remoteActive=active;
  $rbar.classList.toggle('on',active);
  if(active){
    $ptt.classList.add('blocked');
    $plbl.textContent='ΚΑΝΑΛΙ ΚΛΕΙΣΤΟ';
    vibe(30);
    setHint('Ο άλλος μιλάει...');
  }else{
    $ptt.classList.remove('blocked');
    if(!pttActive){
      $plbl.textContent='ΚΡΑΤΑ ΓΙΑ PTT';
      setHint('Κράτα πατημένο για να μιλήσεις');
    }
  }
}

function manualReconnect(){
  wsRetries=0;
  closePc();
  connectWs();
}

// ── PTT Touch Events ────────────────────────
$ptt.addEventListener('touchstart',e=>{e.preventDefault();pttOn();},{passive:false});
$ptt.addEventListener('touchend',  e=>{e.preventDefault();pttOff();},{passive:false});
$ptt.addEventListener('touchcancel',e=>{e.preventDefault();pttOff();},{passive:false});
$ptt.addEventListener('mousedown', ()=>pttOn());
$ptt.addEventListener('mouseup',   ()=>pttOff());
$ptt.addEventListener('mouseleave',()=>{if(pttActive)pttOff()});
$ptt.addEventListener('contextmenu',e=>e.preventDefault());

// Reconnect αν η εφαρμογή επιστρέψει από background
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){
    if(ws?.readyState!==WebSocket.OPEN) connectWs();
    // Επανέναρξε AudioContext αν έχει παγώσει
    if(audioCtx?.state==='suspended') audioCtx.resume();
  }
});
</script>
</body>
</html>
