<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>PTT Debug</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:#0a0a0a;color:#e0e0e0;font-family:'Courier New',monospace;padding:12px;touch-action:manipulation}
    h2{color:#00e676;letter-spacing:3px;font-size:15px;margin-bottom:12px}
    .row{display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:12px}
    .label{color:#555;min-width:110px}
    .val{color:#fff}
    .ok{color:#00e676} .warn{color:#ff6d00} .err{color:#ff1744}
    #log{
      margin-top:12px;background:#111;border:1px solid #222;border-radius:8px;
      padding:10px;font-size:10px;height:180px;overflow-y:auto;line-height:1.7;
    }
    .log-ok{color:#00e676} .log-warn{color:#ff6d00} .log-err{color:#ff1744} .log-info{color:#888}
    button{
      width:100%;padding:14px;border-radius:10px;border:2px solid #00e676;
      background:#003311;color:#00e676;font-family:'Courier New',monospace;
      font-size:13px;letter-spacing:2px;cursor:pointer;margin-top:8px;
    }
    button:disabled{opacity:0.4}
    button.red{border-color:#ff1744;background:#1a0000;color:#ff1744}
    #ptt-btn{
      width:100%;height:120px;border-radius:16px;font-size:18px;
      letter-spacing:4px;margin-top:12px;
    }
    #ptt-btn.on{background:#003311;border-color:#00e676;box-shadow:0 0 30px rgba(0,230,118,0.3)}
    #meter{width:100%;height:6px;background:#1e1e1e;border-radius:3px;margin-top:8px}
    #meter-bar{height:100%;width:0%;background:#00e676;border-radius:3px;transition:width 0.05s}
  </style>
</head>
<body>
<h2>📻 PTT DEBUG</h2>

<div class="row"><span class="label">Server WS:</span>   <span class="val" id="s-ws">—</span></div>
<div class="row"><span class="label">Peers:</span>       <span class="val" id="s-peers">—</span></div>
<div class="row"><span class="label">Mic stream:</span>  <span class="val" id="s-mic">—</span></div>
<div class="row"><span class="label">PC state:</span>    <span class="val" id="s-pc">—</span></div>
<div class="row"><span class="label">ICE state:</span>   <span class="val" id="s-ice">—</span></div>
<div class="row"><span class="label">ontrack:</span>     <span class="val" id="s-track">—</span></div>
<div class="row"><span class="label">Audio play:</span>  <span class="val" id="s-play">—</span></div>

<div id="meter"><div id="meter-bar"></div></div>

<button id="start-btn" onclick="init()">▶  ΕΝΑΡΞΗ + ΑΔΕΙΑ ΜΙΚΡΟΦΩΝΟΥ</button>
<button id="ptt-btn" disabled class="">🎙️  ΚΡΑΤΑ ΓΙΑ PTT</button>
<button class="red" onclick="reconnect()" style="margin-top:4px">🔄  ΕΠΑΝΑΣΥΝΔΕΣΗ</button>

<div id="log"></div>

<audio id="ra" autoplay playsinline style="display:none"></audio>

<script>
// ══════════════════════════════════════════
const SERVER = 'wss://ptt-server-92jv.onrender.com';
const ROOM = 'Τanos-Talia-8583';
// ══════════════════════════════════════════

const ICE_CFG = { iceServers:[
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {urls:'stun:stun.cloudflare.com:3478'},
  // Πολλαπλοί TURN servers για αξιοπιστία
  {urls:'turn:openrelay.metered.ca:80',    username:'openrelayproject', credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443',   username:'openrelayproject', credential:'openrelayproject'},
  {urls:'turns:openrelay.metered.ca:443',  username:'openrelayproject', credential:'openrelayproject'},
  // Backup TURN
  {urls:'turn:relay.metered.ca:80',        username:'e8dd65f732b6ca916e3eb943', credential:'uWpDHmHJtDEXoJfS'},
]};

let ws, pc, localStream, audioCtx, analyser, animFrame;
let pttDown=false, retryTimer=null;

const $ra    = document.getElementById('ra');
const $ptt   = document.getElementById('ptt-btn');
const $meter = document.getElementById('meter-bar');

// ── Logging ────────────────────────────────────────
function log(msg, cls='log-info') {
  const div = document.getElementById('log');
  const t = new Date().toTimeString().slice(0,8);
  div.innerHTML += `<div class="${cls}">[${t}] ${msg}</div>`;
  div.scrollTop = div.scrollHeight;
  console.log(msg);
}
function setVal(id, txt, cls='') {
  const el=document.getElementById(id);
  el.textContent=txt; el.className='val '+(cls||'');
}

// ── Init: mic + audio unlock ───────────────────────
async function init() {
  document.getElementById('start-btn').disabled=true;
  log('Ζητώ άδεια μικροφώνου...');

  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true,channelCount:1},
      video:false
    });
    // Mute αμέσως
    localStream.getAudioTracks().forEach(t => t.enabled=false);

    const tracks = localStream.getAudioTracks();
    setVal('s-mic', tracks.length + ' track(s): ' + (tracks[0]?.label||'?'), 'ok');
    log('✅ Μικρόφωνο OK: ' + (tracks[0]?.label||'unknown'), 'log-ok');

    // Unlock AudioContext (user gesture)
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') {
      await audioCtx.resume();
    }
    log('✅ AudioContext: ' + audioCtx.state, 'log-ok');

    // Unlock <audio> autoplay
    $ra.muted  = false;
    $ra.volume = 1.0;
    log('Audio element ready, volume=' + $ra.volume);

    connect();
  } catch(err) {
    setVal('s-mic','ΣΦΑΛΜΑ: '+err.message,'err');
    log('❌ Mic error: '+err.message,'log-err');
    document.getElementById('start-btn').disabled=false;
  }
}

// ── WebSocket ──────────────────────────────────────
function connect() {
  if(ws){try{ws.close()}catch(_){}}
  setVal('s-ws','ΣΥΝΔΕΣΗ...','warn');
  log('Σύνδεση σε '+SERVER);

  ws = new WebSocket(SERVER);

  ws.onopen = () => {
    setVal('s-ws','ΣΥΝΔΕΔΕΜΕΝΟ','ok');
    log('✅ WebSocket connected','log-ok');
    ws.send(JSON.stringify({type:'join',room:ROOM}));
  };

  ws.onmessage = async ({data}) => {
    let msg; try{msg=JSON.parse(data)}catch{return}
    log('← '+msg.type + (msg.peers!==undefined?' peers='+msg.peers:''));

    switch(msg.type){
      case 'joined':
        setVal('s-peers', msg.peers);
        if(msg.peers>=2){ await doOffer(); enablePtt(); }
        else log('Αναμονή 2ης συσκευής...','log-warn');
        break;
      case 'peer_joined':
        setVal('s-peers', msg.peers);
        if(msg.peers>=2) enablePtt();
        break;
      case 'peer_left':
        setVal('s-peers', msg.peers);
        closePc(); disablePtt();
        log('Άλλη συσκευή αποσυνδέθηκε','log-warn');
        break;
      case 'offer':  await handleOffer(msg.sdp);  break;
      case 'answer': await handleAnswer(msg.sdp); break;
      case 'ice':    await handleIce(msg.candidate); break;
      case 'ptt':
        log('PTT remote: '+(msg.active?'ON':'OFF'), msg.active?'log-ok':'log-info');
        break;
    }
  };

  ws.onerror = e => { setVal('s-ws','ΣΦΑΛΜΑ','err'); log('❌ WS error','log-err'); };
  ws.onclose = e => {
    setVal('s-ws','ΚΛΕΙΣΤΟ','err');
    log('WS closed code='+e.code,'log-warn');
    if(e.code!==1000) retryTimer=setTimeout(connect,6000);
  };
}

function send(msg){
  if(ws?.readyState===WebSocket.OPEN) ws.send(JSON.stringify(msg));
}

// ── WebRTC ─────────────────────────────────────────
function closePc(){
  if(pc){pc.close();pc=null;}
  setVal('s-pc','—'); setVal('s-ice','—'); setVal('s-track','—'); setVal('s-play','—');
}

function createPc(){
  closePc();
  log('Δημιουργία RTCPeerConnection...');
  pc = new RTCPeerConnection(ICE_CFG);
  setVal('s-pc','created','ok');

  pc.onicecandidate = e => {
    if(e.candidate){
      log('ICE candidate: '+e.candidate.type+' '+e.candidate.protocol);
      send({type:'ice',candidate:e.candidate});
    } else {
      log('ICE gathering complete');
    }
  };

  pc.onicegatheringstatechange = () => {
    log('ICE gathering: '+pc.iceGatheringState);
  };

  pc.oniceconnectionstatechange = () => {
    const s=pc.iceConnectionState;
    setVal('s-ice', s, s==='connected'||s==='completed'?'ok':s==='failed'?'err':'warn');
    log('ICE connection: '+s, s==='connected'||s==='completed'?'log-ok':s==='failed'?'log-err':'log-warn');
    if(s==='failed') {
      log('⚠️ ICE failed — δοκίμασε TURN restart','log-err');
      setTimeout(reconnect,3000);
    }
  };

  pc.onconnectionstatechange = () => {
    const s=pc.connectionState;
    setVal('s-pc', s, s==='connected'?'ok':s==='failed'?'err':'warn');
    log('PC connection: '+s);
  };

  // Remote audio
  pc.ontrack = e => {
    log('✅ ontrack fired! streams='+e.streams.length+' track.kind='+e.track.kind,'log-ok');
    setVal('s-track','✅ received','ok');

    const stream = e.streams[0] || new MediaStream([e.track]);

    // Μέθοδος 1: <audio> element
    $ra.srcObject = stream;
    const p = $ra.play();
    if(p){
      p.then(()=>{
        setVal('s-play','✅ playing','ok');
        log('✅ Audio playing via <audio> element','log-ok');
      }).catch(err=>{
        log('⚠️ <audio>.play() failed: '+err.message+' — δοκιμάζω AudioContext','log-warn');
        setVal('s-play','⚠️ '+err.message,'warn');
        // Μέθοδος 2: AudioContext (fallback για Android)
        playViaAudioContext(stream);
      });
    }
  };

  // Βάλε local track (muted) στο PC
  if(localStream){
    localStream.getTracks().forEach(t=>{
      pc.addTrack(t, localStream);
      log('Added local track: '+t.kind+' enabled='+t.enabled);
    });
  } else {
    log('⚠️ localStream είναι null!','log-err');
  }

  return pc;
}

// Fallback: παίξε remote audio μέσω AudioContext
function playViaAudioContext(stream) {
  try {
    if(!audioCtx || audioCtx.state==='closed'){
      audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    }
    if(audioCtx.state==='suspended') audioCtx.resume();
    const src = audioCtx.createMediaStreamSource(stream);
    src.connect(audioCtx.destination);
    setVal('s-play','✅ via AudioContext','ok');
    log('✅ Audio playing via AudioContext','log-ok');
  } catch(err){
    setVal('s-play','❌ '+err.message,'err');
    log('❌ AudioContext playback failed: '+err.message,'log-err');
  }
}

async function doOffer(){
  const p=createPc();
  log('Δημιουργία offer...');
  const offer=await p.createOffer({offerToReceiveAudio:true});
  log('Offer SDP length='+offer.sdp.length);
  // Έλεγξε αν υπάρχει audio στο SDP
  if(offer.sdp.includes('m=audio')) log('✅ SDP περιέχει audio','log-ok');
  else log('❌ SDP ΔΕΝ περιέχει audio!','log-err');
  await p.setLocalDescription(offer);
  send({type:'offer',sdp:p.localDescription});
}

async function handleOffer(sdp){
  log('Λήψη offer, δημιουργία answer...');
  const p=createPc();
  await p.setRemoteDescription(new RTCSessionDescription(sdp));
  const answer=await p.createAnswer();
  if(answer.sdp.includes('m=audio')) log('✅ Answer SDP περιέχει audio','log-ok');
  else log('❌ Answer SDP ΔΕΝ περιέχει audio!','log-err');
  await p.setLocalDescription(answer);
  send({type:'answer',sdp:p.localDescription});
}

async function handleAnswer(sdp){
  log('Λήψη answer...');
  if(pc) await pc.setRemoteDescription(new RTCSessionDescription(sdp));
}

async function handleIce(c){
  try{
    if(pc&&c){
      await pc.addIceCandidate(new RTCIceCandidate(c));
      log('ICE candidate added: '+c.candidate?.split(' ')[7]);
    }
  }catch(e){log('ICE add error: '+e.message,'log-warn');}
}

// ── PTT ────────────────────────────────────────────
function enablePtt()  { $ptt.disabled=false; log('PTT enabled','log-ok'); }
function disablePtt() { $ptt.disabled=true; }

function startMeter(){
  if(!localStream||!audioCtx) return;
  try {
    const src=audioCtx.createMediaStreamSource(localStream);
    analyser=audioCtx.createAnalyser(); analyser.fftSize=256;
    src.connect(analyser);
    const buf=new Uint8Array(analyser.frequencyBinCount);
    (function tick(){
      analyser.getByteFrequencyData(buf);
      $meter.style.width=Math.min(100,buf.reduce((a,b)=>a+b,0)/buf.length*2.5)+'%';
      animFrame=requestAnimationFrame(tick);
    })();
  }catch(_){}
}
function stopMeter(){
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  $meter.style.width='0%';
}

function pttOn(){
  if(!localStream){log('⚠️ Δεν υπάρχει localStream','log-err');return;}
  localStream.getAudioTracks().forEach(t=>{
    t.enabled=true;
    log('Track unmuted: '+t.label+' enabled='+t.enabled,'log-ok');
  });
  $ptt.classList.add('on');
  $ptt.textContent='🔴  ΜΙΛΑΤΕ...';
  navigator.vibrate&&navigator.vibrate(40);
  startMeter();
  send({type:'ptt',active:true});
}

function pttOff(){
  if(!localStream)return;
  localStream.getAudioTracks().forEach(t=>{t.enabled=false;});
  $ptt.classList.remove('on');
  $ptt.textContent='🎙️  ΚΡΑΤΑ ΓΙΑ PTT';
  stopMeter();
  navigator.vibrate&&navigator.vibrate(20);
  send({type:'ptt',active:false});
}

function reconnect(){
  clearTimeout(retryTimer); closePc(); connect();
}

$ptt.addEventListener('pointerdown',e=>{
  e.preventDefault();
  if($ptt.disabled||pttDown)return;
  pttDown=true; pttOn();
});
$ptt.addEventListener('pointerup',e=>{e.preventDefault();if(!pttDown)return;pttDown=false;pttOff();});
$ptt.addEventListener('pointercancel',()=>{if(pttDown){pttDown=false;pttOff();}});
$ptt.addEventListener('pointerleave', ()=>{if(pttDown){pttDown=false;pttOff();}});
$ptt.addEventListener('contextmenu',e=>e.preventDefault());

document.addEventListener('visibilitychange',()=>{
  if(!document.hidden&&ws?.readyState!==WebSocket.OPEN) reconnect();
});
</script>
</body>
</html>
