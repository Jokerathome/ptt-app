<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>PTT Radio</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --green: #00e676; --green-dim: #003311;
      --orange: #ff6d00; --orange-dim: #1a0e00;
      --red: #ff1744; --bg: #0a0a0a;
      --surface: #111111; --border: #1e1e1e;
      --text: #e0e0e0; --muted: #444;
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Courier New', monospace; overflow: hidden; touch-action: manipulation;
    }
    #app {
      height: 100dvh; display: flex; flex-direction: column;
      align-items: center; padding: 16px; gap: 12px;
    }
    header { width: 100%; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 18px; font-weight: bold; letter-spacing: 4px; color: var(--green); }
    .status-pill {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 12px; font-size: 11px; letter-spacing: 1px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
    .dot.green  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.orange { background: var(--orange); }
    .dot.red    { background: var(--red); animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .signal-box {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .signal-label { font-size: 10px; letter-spacing: 2px; color: var(--muted); }
    .signal-bars  { display: flex; align-items: flex-end; gap: 3px; height: 22px; }
    .signal-bars span { width: 5px; background: var(--border); border-radius: 2px; transition: background 0.3s; }
    .signal-bars span:nth-child(1){height:5px}  .signal-bars span:nth-child(2){height:9px}
    .signal-bars span:nth-child(3){height:13px} .signal-bars span:nth-child(4){height:17px}
    .signal-bars span:nth-child(5){height:21px}
    .signal-bars.s1 span:nth-child(1) { background:var(--green); }
    .signal-bars.s2 span:nth-child(-n+2) { background:var(--green); }
    .signal-bars.s3 span:nth-child(-n+3) { background:var(--green); }
    .signal-bars.s4 span:nth-child(-n+4) { background:var(--green); }
    .signal-bars.s5 span                 { background:var(--green); }
    .peer-count { font-size: 12px; color: var(--green); letter-spacing: 1px; }

    #remote-bar {
      width: 100%; border-radius: 10px; padding: 12px 16px; text-align: center;
      font-size: 14px; letter-spacing: 3px; font-weight: bold;
      background: var(--orange-dim); border: 1px solid var(--orange); color: var(--orange);
      opacity: 0; transition: opacity 0.15s; pointer-events: none;
    }
    #remote-bar.active { opacity: 1; }

    #ptt-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px; width: 100%;
    }
    #ptt-btn {
      width: min(280px, 75vw); height: min(280px, 75vw); border-radius: 50%;
      border: 3px solid var(--border); background: var(--surface);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; cursor: pointer; user-select: none; -webkit-user-select: none;
      transition: border-color 0.1s, background 0.1s, box-shadow 0.1s;
    }
    #ptt-btn.talking {
      border-color: var(--green); background: var(--green-dim);
      animation: glow 1s ease-in-out infinite;
    }
    #ptt-btn.blocked { border-color: var(--orange); }
    #ptt-btn:disabled { opacity: 0.35; }
    @keyframes glow {
      0%,100%{ box-shadow: 0 0 30px rgba(0,230,118,0.2); }
      50%    { box-shadow: 0 0 60px rgba(0,230,118,0.5); }
    }
    .ptt-icon  { font-size: 64px; line-height: 1; pointer-events: none; }
    .ptt-label { font-size: 11px; letter-spacing: 3px; color: var(--muted); pointer-events: none; }
    #ptt-btn.talking .ptt-label { color: var(--green); }
    #ptt-btn.blocked .ptt-label { color: var(--orange); }

    #hint { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-align: center; line-height: 1.6; }

    #retry-btn {
      display: none; background: none; border: 1px solid var(--red); color: var(--red);
      font-family: 'Courier New', monospace; font-size: 12px; letter-spacing: 3px;
      padding: 12px 24px; border-radius: 8px; cursor: pointer; width: 100%;
    }
    #retry-btn.show { display: block; }

    #meter { width: 100%; height: 4px; border-radius: 2px; background: var(--border); overflow: hidden; }
    #meter-bar { height: 100%; width: 0%; background: var(--green); border-radius: 2px; transition: width 0.05s; }

    /* Οθόνη άδειας μικροφώνου */
    #mic-screen {
      position: fixed; inset: 0; background: var(--bg); z-index: 100;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 24px; padding: 32px;
    }
    #mic-screen h2 { color: var(--green); letter-spacing: 3px; font-size: 16px; text-align: center; }
    #mic-screen p  { color: var(--muted); font-size: 12px; text-align: center; line-height: 1.9; max-width: 280px; }
    #mic-btn {
      background: var(--green-dim); border: 2px solid var(--green); color: var(--green);
      font-family: 'Courier New', monospace; font-size: 14px; letter-spacing: 2px;
      padding: 18px 32px; border-radius: 12px; cursor: pointer; width: 100%;
    }
  </style>
</head>
<body>

<!-- Πρώτη οθόνη: ζητά άδεια με user gesture (απαίτηση browser) -->
<div id="mic-screen">
  <span style="font-size:72px">🎙️</span>
  <h2>PTT RADIO</h2>
  <p>Πάτα το κουμπί για να δώσεις άδεια μικροφώνου και να ξεκινήσει η εφαρμογή.</p>
  <button id="mic-btn" onclick="requestMicAndStart()">▶ &nbsp;ΕΝΑΡΞΗ</button>
  <p id="mic-err" style="color:var(--red);display:none">Δεν δόθηκε άδεια μικροφώνου.<br>Ελέγξε τις ρυθμίσεις του Chrome.</p>
</div>

<!-- Κύρια εφαρμογή -->
<div id="app" style="display:none">
  <header>
    <span class="logo">📻 PTT</span>
    <div class="status-pill">
      <div class="dot" id="dot"></div>
      <span id="status-txt">ΑΠΟΣΥΝΔΕΣΜΕΝΟ</span>
    </div>
  </header>

  <div class="signal-box">
    <span class="signal-label">ΣΗΜΑΤΑ</span>
    <div class="signal-bars" id="sig-bars">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <span class="peer-count" id="peer-txt">—</span>
  </div>

  <div id="remote-bar">🔊 &nbsp;ΜΙΛΑΕΙ...</div>

  <div id="ptt-wrap">
    <button id="ptt-btn" disabled>
      <span class="ptt-icon">🎙️</span>
      <span class="ptt-label" id="ptt-label">ΚΡΑΤΑ ΓΙΑ PTT</span>
    </button>
    <div id="meter"><div id="meter-bar"></div></div>
    <p id="hint">Αναμονή σύνδεσης...</p>
  </div>

  <button id="retry-btn" onclick="reconnect()">🔄 &nbsp;ΕΠΑΝΑΣΥΝΔΕΣΗ</button>
</div>

<!-- ΚΛΕΙΔΙ: μόνιμο audio element με playsinline για Android -->
<audio id="remote-audio" autoplay playsinline style="display:none"></audio>

<script>
// ════════════════════════════════════════════════════
//  ΡΥΘΜΙΣΕΙΣ — μόνο αυτές οι 2 γραμμές αλλάζεις
// ════════════════════════════════════════════════════
const SERVER = 'wss://ptt-server-92jv.onrender.com';
const ROOM = 'Τanos-Talia-8583';
// ════════════════════════════════════════════════════

const ICE_CFG = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    {
      urls: [
        'turn:openrelay.metered.ca:80',
        'turn:openrelay.metered.ca:443',
        'turns:openrelay.metered.ca:443'
      ],
      username: 'openrelayproject',
      credential: 'openrelayproject'
    }
  ]
};

const $dot         = document.getElementById('dot');
const $statusTxt   = document.getElementById('status-txt');
const $sigBars     = document.getElementById('sig-bars');
const $peerTxt     = document.getElementById('peer-txt');
const $remoteBar   = document.getElementById('remote-bar');
const $pttBtn      = document.getElementById('ptt-btn');
const $pttLabel    = document.getElementById('ptt-label');
const $hint        = document.getElementById('hint');
const $retryBtn    = document.getElementById('retry-btn');
const $meterBar    = document.getElementById('meter-bar');
const $remoteAudio = document.getElementById('remote-audio');
const $app         = document.getElementById('app');
const $micScreen   = document.getElementById('mic-screen');
const $micErr      = document.getElementById('mic-err');

let ws, pc;
let localStream  = null;
let audioCtx, analyser, animFrame;
let pttDown      = false;
let remoteActive = false;
let retryTimer   = null;
let wakeLock     = null;

// ════════════════════════════════════════════════════
//  ΒΗΜΑ 1: Παίρνουμε μικρόφωνο ΜΙΑ ΦΟΡΑ μέσα σε
//  user gesture ώστε το browser να επιτρέψει και το
//  audio playback (Android απαίτηση)
// ════════════════════════════════════════════════════
async function requestMicAndStart() {
  const btn = document.getElementById('mic-btn');
  btn.disabled = true;
  btn.textContent = '⏳  ΠΑΡΑΚΑΛΩ ΠΕΡΙΜΕΝΕ...';

  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
        channelCount: 1
        // sampleRate: αφήνουμε τη συσκευή να επιλέξει
      },
      video: false
    });

    // Mute αμέσως — στέλνουμε ήχο ΜΟΝΟ με PTT
    localStream.getAudioTracks().forEach(t => { t.enabled = false; });

    // Ξεκλείδωμα audio playback μέσα στο user gesture
    $remoteAudio.volume = 1.0;
    $remoteAudio.muted  = false;
    // Ένα σύντομο "play" για να ξεκλειδώσει το autoplay
    try { await $remoteAudio.play(); } catch(_) {}

    // Δείξε κύρια οθόνη
    $micScreen.style.display = 'none';
    $app.style.display = 'flex';

    connect();

  } catch(err) {
    console.error('Mic:', err);
    btn.disabled = false;
    btn.textContent = '🔄  ΔΟΚΙΜΑΣΕ ΞΑΝΑ';
    $micErr.style.display = 'block';
  }
}

// ── UI ─────────────────────────────────────────────
function setStatus(cls, txt) { $dot.className='dot '+cls; $statusTxt.textContent=txt; }
function setSignal(n, peers) {
  $sigBars.className = 'signal-bars' + (n ? ' s'+n : '');
  $peerTxt.textContent = peers > 0 ? peers+(peers===1?' χρήστης':' χρήστες') : '—';
}
function setHint(t) { $hint.textContent = t; }
function vibrate(ms) { navigator.vibrate && navigator.vibrate(ms); }

async function grabWakeLock() {
  try { if ('wakeLock' in navigator && !wakeLock) wakeLock = await navigator.wakeLock.request('screen'); } catch(_){}
}
function dropWakeLock() { if (wakeLock) { wakeLock.release(); wakeLock=null; } }

function startMeter() {
  if (!localStream || audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const src = audioCtx.createMediaStreamSource(localStream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  src.connect(analyser);
  const buf = new Uint8Array(analyser.frequencyBinCount);
  (function tick() {
    analyser.getByteFrequencyData(buf);
    $meterBar.style.width = Math.min(100, buf.reduce((a,b)=>a+b,0)/buf.length*2.5) + '%';
    animFrame = requestAnimationFrame(tick);
  })();
}
function stopMeter() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame=null; }
  $meterBar.style.width = '0%';
  if (audioCtx) { audioCtx.close().catch(()=>{}); audioCtx=null; analyser=null; }
}

// ════════════════════════════════════════════════════
//  WebRTC — Σωστή αρχιτεκτονική
//
//  ✅ localStream track μπαίνει στο PC ΑΜΕΣΩΣ (muted)
//  ✅ PTT = μόνο track.enabled = true/false
//  ✅ Χωρίς addTrack/replaceTrack μετά τη σύνδεση
//  ✅ Χωρίς renegotiation → δουλεύει σε Android 10+
// ════════════════════════════════════════════════════
function closePc() { if (pc) { pc.close(); pc=null; } }

function createPc() {
  closePc();
  pc = new RTCPeerConnection(ICE_CFG);

  pc.onicecandidate = e => {
    if (e.candidate) send({ type:'ice', candidate:e.candidate });
  };

  pc.oniceconnectionstatechange = () => {
    const s = pc.iceConnectionState;
    console.log('ICE state:', s);
    if (s==='connected' || s==='completed') {
      setSignal(5, 2);
      setHint('Κράτα πατημένο για να μιλήσεις');
    } else if (s==='checking') {
      setSignal(2, 2); setHint('Εγκατάσταση σύνδεσης...');
    } else if (s==='disconnected' || s==='failed') {
      setSignal(1, 1); setTimeout(reconnect, 3000);
    }
  };

  // Remote audio: ΑΠΕΥΘΕΙΑΣ στο μόνιμο <audio> element
  pc.ontrack = e => {
    console.log('ontrack:', e.streams.length, 'streams');
    if (!e.streams[0]) return;
    $remoteAudio.srcObject = e.streams[0];
    // Πάντα .play() — Android δεν κάνει autoplay χωρίς αυτό
    $remoteAudio.play().catch(err => {
      console.warn('remote audio play failed:', err);
      // Retry
      setTimeout(() => $remoteAudio.play().catch(()=>{}), 300);
    });
  };

  // ══ ΤΟ ΚΛΕΙΔΙ ══
  // Βάζουμε το muted local track ΤΩΡΑ στο PC
  // Το remote side θα ξέρει από την αρχή ότι θα δεχτεί audio
  if (localStream) {
    localStream.getTracks().forEach(track => {
      pc.addTrack(track, localStream);
    });
  }

  return pc;
}

async function doOffer() {
  const p = createPc();
  const offer = await p.createOffer({ offerToReceiveAudio: true });
  await p.setLocalDescription(offer);
  send({ type:'offer', sdp:p.localDescription });
}

async function handleOffer(sdp) {
  const p = createPc();
  await p.setRemoteDescription(new RTCSessionDescription(sdp));
  const answer = await p.createAnswer();
  await p.setLocalDescription(answer);
  send({ type:'answer', sdp:p.localDescription });
}

async function handleAnswer(sdp) {
  if (pc) await pc.setRemoteDescription(new RTCSessionDescription(sdp));
}

async function handleIce(c) {
  try { if (pc && c) await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(_) {}
}

// ════════════════════════════════════════════════════
//  PTT — απλό enable/disable του track
// ════════════════════════════════════════════════════
async function pttOn() {
  if (remoteActive || !localStream) { vibrate(100); return; }
  localStream.getAudioTracks().forEach(t => t.enabled = true);
  $pttBtn.classList.add('talking');
  $pttLabel.textContent = 'ΜΙΛΑΤΕ';
  vibrate(40);
  await grabWakeLock();
  startMeter();
  send({ type:'ptt', active:true });
  setHint('Μιλάτε... Αφήστε για να ακούσετε');
}

function pttOff() {
  if (!localStream) return;
  localStream.getAudioTracks().forEach(t => t.enabled = false);
  $pttBtn.classList.remove('talking');
  $pttLabel.textContent = 'ΚΡΑΤΑ ΓΙΑ PTT';
  stopMeter();
  dropWakeLock();
  vibrate(20);
  send({ type:'ptt', active:false });
  if (!remoteActive) setHint('Κράτα πατημένο για να μιλήσεις');
}

// ── WebSocket ───────────────────────────────────────
function send(msg) {
  if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
}

function connect() {
  if (ws) { try { ws.close(); } catch(_){} }
  setStatus('orange', 'ΣΥΝΔΕΣΗ...');
  setHint('Σύνδεση στον server...');
  $retryBtn.classList.remove('show');
  $pttBtn.disabled = true;

  try { ws = new WebSocket(SERVER); }
  catch(e) { setStatus('red','ΣΦΑΛΜΑ'); $retryBtn.classList.add('show'); return; }

  ws.onopen = () => {
    send({ type:'join', room:ROOM });
    setStatus('green', 'ΣΥΝΔΕΔΕΜΕΝΟ');
  };

  ws.onmessage = async ({ data }) => {
    let msg; try { msg=JSON.parse(data); } catch { return; }
    switch(msg.type) {
      case 'joined':
        setSignal(3, msg.peers);
        if (msg.peers >= 2) {
          await doOffer();
          $pttBtn.disabled = false;
          setHint('Κράτα πατημένο για να μιλήσεις');
        } else {
          setHint('Αναμονή για τη δεύτερη συσκευή...');
        }
        break;
      case 'peer_joined':
        setSignal(3, msg.peers);
        if (msg.peers >= 2) {
          $pttBtn.disabled = false;
          setHint('Κράτα πατημένο για να μιλήσεις');
        }
        break;
      case 'peer_left':
        setSignal(1, msg.peers);
        setRemoteSpeaking(false);
        $pttBtn.disabled = true;
        closePc();
        setHint('Η άλλη συσκευή αποσυνδέθηκε...');
        break;
      case 'offer':  await handleOffer(msg.sdp); break;
      case 'answer': await handleAnswer(msg.sdp); break;
      case 'ice':    await handleIce(msg.candidate); break;
      case 'ptt':    setRemoteSpeaking(msg.active); break;
    }
  };

  ws.onerror = () => {
    setStatus('red','ΣΦΑΛΜΑ ΣΥΝΔΕΣΗΣ');
    $retryBtn.classList.add('show');
    retryTimer = setTimeout(connect, 8000);
  };

  ws.onclose = e => {
    if (e.code===1000) return;
    setStatus('','ΑΠΟΣΥΝΔΕΣΜΕΝΟ');
    setSignal(0,0); $pttBtn.disabled=true;
    $retryBtn.classList.add('show');
    retryTimer = setTimeout(connect, 5000);
  };
}

function reconnect() {
  clearTimeout(retryTimer); closePc(); connect();
}

function setRemoteSpeaking(active) {
  remoteActive = active;
  $remoteBar.classList.toggle('active', active);
  if (active) {
    $pttBtn.classList.add('blocked');
    $pttLabel.textContent = 'ΚΑΝΑΛΙ ΚΛΕΙΣΤΟ';
    setHint('Ο άλλος μιλάει... περίμενε');
    vibrate(30);
  } else {
    $pttBtn.classList.remove('blocked');
    if (!pttDown) {
      $pttLabel.textContent = 'ΚΡΑΤΑ ΓΙΑ PTT';
      setHint('Κράτα πατημένο για να μιλήσεις');
    }
  }
}

// ── PTT Events ──────────────────────────────────────
$pttBtn.addEventListener('pointerdown', async e => {
  e.preventDefault();
  if ($pttBtn.disabled || pttDown) return;
  pttDown = true; await pttOn();
});
$pttBtn.addEventListener('pointerup', e => {
  e.preventDefault();
  if (!pttDown) return;
  pttDown = false; pttOff();
});
$pttBtn.addEventListener('pointercancel', () => { if(pttDown){pttDown=false;pttOff();} });
$pttBtn.addEventListener('pointerleave',  () => { if(pttDown){pttDown=false;pttOff();} });
$pttBtn.addEventListener('contextmenu', e => e.preventDefault());

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && ws?.readyState !== WebSocket.OPEN) reconnect();
});
</script>
</body>
</html>
